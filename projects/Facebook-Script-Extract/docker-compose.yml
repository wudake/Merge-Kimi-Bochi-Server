version: "3.8"

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  backend:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - API_KEY=${API_KEY:-dev-api-key-change-me}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - TEMP_DIR=./temp
      - OUTPUT_DIR=./output
    volumes:
      - ./temp:/app/temp
      - ./output:/app/output
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build: .
    restart: unless-stopped
    command: celery -A api.celery_app worker --loglevel=info --concurrency=2
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - API_KEY=${API_KEY:-dev-api-key-change-me}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - TEMP_DIR=./temp
      - OUTPUT_DIR=./output
    volumes:
      - ./temp:/app/temp
      - ./output:/app/output
      - whisper_models:/root/.cache/whisper
    depends_on:
      - redis
      - backend

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  redis_data:
  whisper_models:
