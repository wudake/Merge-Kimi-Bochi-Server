version: '3.8'

services:
  videoauto:
    build: .
    container_name: openclaw-video-auto
    ports:
      - "5000:5000"
    volumes:
      # 视频目录
      - ./videos:/app/videos
      # 输出目录
      - ./output:/app/output
      # 资源目录
      - ./assets:/app/assets
      # 静态文件
      - ./static:/app/static
      # 日志目录
      - ./logs:/app/logs
      # 配置文件
      - ./config:/app/config
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/qr/ip"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx 反向代理（HTTPS）
  nginx:
    image: nginx:alpine
    container_name: videoauto-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./output:/usr/share/nginx/html/output:ro
      - ./static:/usr/share/nginx/html/static:ro
    depends_on:
      - videoauto
    restart: unless-stopped
