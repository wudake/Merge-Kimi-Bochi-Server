version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: smm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: smm
      POSTGRES_PASSWORD: smm_password
      POSTGRES_DB: social_media_management
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smm -d social_media_management"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: smm-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
