# ─────────────────────────────────────────────────────────────────────────────
# Facebook-Script-Extract 路由(Phase 3 启用)
# ─────────────────────────────────────────────────────────────────────────────

location /fbse/api/ {
    # FastAPI 没有全局前缀,/tasks /health 等直接挂在 /
    # /fbse/api/tasks → fbse_api:/tasks
    auth_request /_auth_verify;
    auth_request_set $auth_user_id $upstream_http_x_user_id;

    rewrite ^/fbse/api/(.*)$ /$1 break;
    proxy_pass http://fbse_api;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-User-Id $auth_user_id;
}

location /fbse/ws/ {
    # WebSocket
    auth_request /_auth_verify;

    rewrite ^/fbse/ws/(.*)$ /ws/$1 break;
    proxy_pass http://fbse_api;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 3600s;        # 长连接
}

location /fbse/ {
    auth_request /_auth_verify;
    proxy_pass http://fbse_web/;
    proxy_set_header Host $host;
    error_page 401 = @fbse_login;
}

location @fbse_login {
    return 302 /op/login?redirect=$request_uri;
}
