# ─────────────────────────────────────────────────────────────────────────────
# Dake-Video-Auto 路由(Phase 4 启用)
# ─────────────────────────────────────────────────────────────────────────────

location /dva/ {
    # Flask 通过 ProxyFix(x_prefix=1) 感知 X-Forwarded-Prefix
    # url_for() 会自动加 /dva 前缀
    auth_request /_auth_verify;
    auth_request_set $auth_user_id $upstream_http_x_user_id;
    auth_request_set $auth_role $upstream_http_x_user_role;

    proxy_pass http://dva_app/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /dva;
    proxy_set_header X-User-Id $auth_user_id;
    proxy_set_header X-User-Role $auth_role;

    # 视频处理可能很慢,放宽超时
    proxy_read_timeout 1800s;
    proxy_send_timeout 1800s;

    error_page 401 = @dva_login;
}

location @dva_login {
    return 302 /op/login?redirect=$request_uri;
}
