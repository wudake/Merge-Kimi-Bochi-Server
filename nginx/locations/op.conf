# ─────────────────────────────────────────────────────────────────────────────
# Operation_Manage 路由(Phase 2 启用)
# ─────────────────────────────────────────────────────────────────────────────

location /op/api/ {
    # NestJS API (globalPrefix=api/v1)
    # /op/api/v1/auth/login → opman_api:/api/v1/auth/login
    rewrite ^/op/api/(.*)$ /api/$1 break;
    proxy_pass http://opman_api;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location /op/login {
    # 登录页豁免 auth_request,避免 401 → /op/login 死循环
    proxy_pass http://opman_web/;
}

location /op/ {
    # 静态前端 (build with VITE_BASE=/op/)
    auth_request /_auth_verify;
    auth_request_set $auth_user_id $upstream_http_x_user_id;
    auth_request_set $auth_role $upstream_http_x_user_role;

    proxy_pass http://opman_web/;
    proxy_set_header X-User-Id $auth_user_id;
    proxy_set_header X-User-Role $auth_role;

    # 未登录时跳到登录页
    error_page 401 = @op_login;
}

location @op_login {
    return 302 /op/login;
}
