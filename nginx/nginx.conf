# ─────────────────────────────────────────────────────────────────────────────
# Nginx 主配置 — 整合系统总入口
#
# 当前阶段:Phase 5(全模块接入,nginx 已启用所有 location)
#
# 路径分发设计:
#   /              → portal 静态门户
#   /op/*          → Operation_Manage(NestJS + React)
#   /fbse/*        → Facebook-Script-Extract(FastAPI + React)
#   /dva/*         → Dake-Video-Auto(Flask)
#   /_auth_verify  → SSO 校验入口(internal,调 OPMan /api/v1/auth/verify)
# ─────────────────────────────────────────────────────────────────────────────

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';
    access_log  /var/log/nginx/access.log  main;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    client_max_body_size 500m;          # 视频上传需要大 body

    # ─── upstream(Phase 2-4 启用) ───
    upstream opman_api    { server opman_api:3000; }
    upstream opman_web    { server opman_web:80; }
    upstream fbse_api     { server fbse_backend:8000; }
    upstream fbse_web     { server fbse_frontend:80; }
    upstream dva_app      { server dva_app:5000; }

    # ─── HTTP → HTTPS 跳转 ───
    server {
        listen 80;
        server_name app.${MAIN_DOMAIN};
        return 301 https://$host$request_uri;
    }

    # ─── HTTPS 主入口 ───
    server {
        listen 443 ssl http2;
        server_name app.${MAIN_DOMAIN};

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;

        # ─── Portal 静态门户(Phase 1 即可启用) ───
        location = / {
            root /usr/share/nginx/portal;
            try_files /index.html =404;
        }
        location /portal-assets/ {
            alias /usr/share/nginx/portal/assets/;
            expires 7d;
        }

        # ─── SSO 校验入口(Phase 2 启用) ───
        location = /_auth_verify {
            internal;
            proxy_pass http://opman_api/api/v1/auth/verify;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
        }

        # ─── 模块路由(各阶段陆续启用) ───
        include /etc/nginx/locations/*.conf;

        # ─── 兜底:未匹配路径回 portal ───
        location / {
            return 302 /;
        }
    }
}
