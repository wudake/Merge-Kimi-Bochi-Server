<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>整合控制台 — Boswindor</title>
  <link rel="stylesheet" href="/portal-assets/style.css">
  <style>
    .user-loading { color: var(--text-soft); font-size: 14px; }
    .user-name { color: var(--text); font-weight: 500; }
    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
    }
    .status-ok { background: #10b981; }
    .status-pending { background: #9ca3af; }
    .status-error { background: #ef4444; }
    .module-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-soft);
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">⚙️</span>
      <span class="title">整合控制台</span>
    </div>
    <div class="user" id="user-info">
      <span class="status-dot status-pending"></span>登录态检测中...
    </div>
  </header>

  <main class="hero">
    <h1>选择要进入的工作台</h1>
    <p class="subtitle">三个核心功能模块，统一登录，统一入口</p>

    <div class="modules">

      <a class="card" href="/op/" data-module="op">
        <div class="card-icon">📊</div>
        <h2>运营管理</h2>
        <p>账号管理、内容日历、选题库、数据看板</p>
        <div class="module-status" id="status-op">
          <span class="status-dot status-pending"></span>检测中...
        </div>
        <div class="card-footer">
          <span>Operation_Manage</span>
          <span class="arrow">→</span>
        </div>
      </a>

      <a class="card" href="/fbse/" data-module="fbse">
        <div class="card-icon">📝</div>
        <h2>脚本提取</h2>
        <p>Facebook / YouTube / Ads Library 视频转文字</p>
        <div class="module-status" id="status-fbse">
          <span class="status-dot status-pending"></span>检测中...
        </div>
        <div class="card-footer">
          <span>Facebook-Script-Extract</span>
          <span class="arrow">→</span>
        </div>
      </a>

      <a class="card" href="/dva/" data-module="dva">
        <div class="card-icon">🎬</div>
        <h2>视频自动化</h2>
        <p>视频下载、AI 配音、智能剪辑、9:16 适配</p>
        <div class="module-status" id="status-dva">
          <span class="status-dot status-pending"></span>检测中...
        </div>
        <div class="card-footer">
          <span>Dake-Video-Auto</span>
          <span class="arrow">→</span>
        </div>
      </a>

    </div>
  </main>

  <footer class="footer">
    <span>v1.0 · 全模块接入</span>
    <a href="#" id="logout-btn" style="display:none;">退出登录</a>
  </footer>

  <script>
    // ─── 1. 登录态检测 ───
    fetch('/op/api/v1/auth/me', { credentials: 'include' })
      .then(r => r.ok ? r.json() : Promise.reject(r.status))
      .then(user => {
        const data = user.data || user;
        document.getElementById('user-info').innerHTML =
          '<span class="status-dot status-ok"></span>' +
          '<span class="user-name">' + (data.username || data.name || 'unknown') +
          ' (' + (data.role || '') + ')</span>';
        document.getElementById('logout-btn').style.display = 'inline';
      })
      .catch(status => {
        const el = document.getElementById('user-info');
        if (status === 401) {
          el.innerHTML = '<span class="status-dot status-error"></span>未登录，跳转中...';
          setTimeout(() => {
            location.href = '/op/login?redirect=' + encodeURIComponent(location.pathname);
          }, 800);
        } else {
          // 后端未启动或服务不可用
          el.innerHTML = '<span class="status-dot status-error"></span>服务暂不可用';
        }
      });

    // ─── 2. 退出登录 ───
    document.getElementById('logout-btn').addEventListener('click', e => {
      e.preventDefault();
      fetch('/op/api/v1/auth/logout', { method: 'POST', credentials: 'include' })
        .finally(() => location.href = '/op/login');
    });

    // ─── 3. 各模块健康检测 ───
    const modules = [
      { id: 'op',    path: '/op/api/v1/auth/verify' },
      { id: 'fbse', path: '/fbse/api/health' },
      { id: 'dva',  path: '/dva/api/qr/ip' }
    ];

    modules.forEach(m => {
      fetch(m.path, { method: 'HEAD', credentials: 'include' })
        .then(r => {
          const el = document.getElementById('status-' + m.id);
          if (r.ok) {
            el.innerHTML = '<span class="status-dot status-ok"></span>运行中';
          } else if (r.status === 401) {
            el.innerHTML = '<span class="status-dot status-ok"></span>运行中（需登录）';
          } else {
            el.innerHTML = '<span class="status-dot status-error"></span>异常 (' + r.status + ')';
          }
        })
        .catch(() => {
          document.getElementById('status-' + m.id).innerHTML =
            '<span class="status-dot status-error"></span>未启动';
        });
    });
  </script>
</body>
</html>
